<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <title>DOM dæmi</title>
</head>
<body>
  <input type="text" id="taskInput" placeholder="Skrifaðu verkefni" />
  <button id="addBtn">Bæta við</button>

  <ul id="taskList"></ul>

  <script>
    const input = document.getElementById("taskInput");
    const button = document.getElementById("addBtn");
    const list = document.getElementById("taskList");

    button.addEventListener("click", function () {
      const taskText = input.value;

      if (taskText.trim() === "") {
        alert("Skrifaðu eitthvað fyrst");
        return;
      }

      const li = document.createElement("li");
      li.textContent = taskText;

      list.appendChild(li);
      input.value = "";
    });
  </script>
  <script src=""></script>
</body>
</html>
